services:
  - type: web
    name: justicemap-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: WOLFRAM_APP_ID
        sync: false
      - key: VECTOR_STORE_PATH
        value: ./vector_db
